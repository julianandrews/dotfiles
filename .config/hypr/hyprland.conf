source = ~/.config/hypr/monitors.local.conf

# Google Messages
exec-once = google-chrome --profile-directory=Default --app-id=hpfldicfbfomlpcikngkocigghgafkph

source = ~/.config/hypr/execs.local.conf

$mainMod = SUPER

input {
  kb_options = caps:swapescape
  repeat_rate = 50
  repeat_delay = 250

  touchpad {
    natural_scroll = true
    disable_while_typing = true
  }
}

master {
  mfact = 0.60
  new_status = master
}

general {
  layout = master
}

misc {
  close_special_on_empty = true
  focus_on_activate = true
  on_focus_under_fullscreen = 1
}

# Workspaces
workspace = name:messages, default:true

# Window rules
windowrule {
    name = float_pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)$
    persistent_size = on
    float = true
    center = on
}
windowrule = opacity 0.9,match:class footclient
windowrule {
    name = portal_dialogs
    match:class = ^(org\.freedesktop\.impl\.portal\.desktop\.(hyprland|gtk)|[Xx]dg-desktop-portal-gtk)$
    float = true
    center = on
}
windowrule = match:class chrome-fmgjjmmmlfnkbppncabfkddbjimcfncm-Default, workspace special:email
windowrule = match:class chrome-kjbdgfilnfhdoflbpgamdcdgpehopbep-Default, workspace special:calendar
windowrule = match:class chrome-hmjcdonmhijmnefklekckjkeoknbiipb-Default, workspace special:ai
windowrule = match:class chrome-bmioiijgdgadpcbmhkbemnigebkifmld-Default, workspace special:video
windowrule = match:class chrome-agimnkijcaahngcdmfeangaknmldooml-Default, workspace special:video

# General
bind = $mainMod SHIFT, E, exec, uwsm stop
bind = $mainMod, E, exec, loginctl lock-session

# Launchers
bind = $mainMod SHIFT, Return, exec, footclient
bind = $mainMod, SPACE, exec, pkill fuzzel || fuzzel
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy

# Window management
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow
bind = $mainMod, Return, layoutmsg, swapwithmaster master
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod SHIFT, J, layoutmsg, swapnext
bind = $mainMod SHIFT, K, layoutmsg, swapprev
bind = $mainMod, L, layoutmsg, mfact +0.02
bind = $mainMod, H, layoutmsg, mfact -0.02
bind = $mainMod, B, exec, pkill -USR1 waybar

# Workspace management
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/workspace-or-launch.sh messages Messages google-chrome --profile-directory=Default --app-id=hpfldicfbfomlpcikngkocigghgafkph
bind = $mainMod, X, exec, ~/.config/hypr/scripts/workspace-or-launch.sh ai DeepSeek google-chrome --profile-directory=Default --app-id=hmjcdonmhijmnefklekckjkeoknbiipb
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1
bind = $mainMod CTRL, Tab, movetoworkspace, e+1
bind = $mainMod CTRL SHIFT, Tab, movetoworkspace, e-1

# Monitor management
bind = $mainMod, W, focusmonitor, +1
bind = $mainMod SHIFT, W, movewindow, mon:+1

# Computer specific binds
source = ~/.config/hypr/binds.local.conf
