[general]
use-terminal-pinentry = true
default-save-path=~/Downloads/
enable-osc8=true
default-menu-cmd=fzf

[ui]
styleset-name=tokyonight-storm
fuzzy-complete=true
reverse-thread-order=true
threading-enabled=false

[statusline]

[viewer]

[compose]
#address-book-cmd=
file-picker-cmd=find ~ -not -path '*/.*' | fzf --multi

[multipart-converters]

[filters]
text/plain=colorize
text/calendar=calendar
message/delivery-status=colorize
message/rfc822=colorize
text/html=! html
.headers=colorize

[openers]

[hooks]
mail-sent=systemctl --user start mbsync@$AERC_ACCOUNT:Sent
mail-added= [ "$AERC_FOLDER" = "Inbox" ] && folder=INBOX || folder=$AERC_FOLDER;systemctl --user start mbsync@$AERC_ACCOUNT:$folder.service
mail-deleted= [ "$AERC_FOLDER" = "Inbox" ] && folder=INBOX || folder=$AERC_FOLDER;systemctl --user start mbsync@$AERC_ACCOUNT:$folder.service

[templates]
