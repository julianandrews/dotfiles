configurations:
  - host: imap.fastmail.com
    port: 993
    username: julian@seemyvest.net
    tls: true
    passwordCMD: "systemd-creds cat fastmail-app-password"
    alias: "fastmail"
    boxes:
      - mailbox: INBOX
        onNewMail: "mbsync -VL fastmail:INBOX"
        onChangedMail: "mbsync -VL fastmail:INBOX"
        onDeletedMail: "mbsync -VL fastmail:INBOX"
      - mailbox: Sent
        onNewMail: "mbsync -VL fastmail:Sent"
        onChangedMail: "mbsync -VL fastmail:Sent"
        onDeletedMail: "mbsync -VL fastmail:Sent"
      - mailbox: Archive
        onNewMail: "mbsync -VL fastmail:Archive"
        onChangedMail: "mbsync -VL fastmail:Archive"
        onDeletedMail: "mbsync -VL fastmail:Archive"
      - mailbox: Drafts
        onNewMail: "mbsync -VL fastmail:Drafts"
        onChangedMail: "mbsync -VL fastmail:Drafts"
        onDeletedMail: "mbsync -VL fastmail:Drafts"
